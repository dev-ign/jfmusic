<!-- @dsCard group="Components" name="Artist Header" subtitle="Signature + Latest Release · Latin badge" viewport='{"width":640,"height":300}' -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artist Header — Caramelo Components</title>
<link href="https://fonts.googleapis.com/css2?family=Island+Moments&family=Schibsted+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(to bottom, #f9ecd3, #e4a45e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .artist-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .artist-header__signature {
    font-family: 'Island Moments', cursive;
    font-size: 64px;
    color: #843a09;
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .artist-header__meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .artist-header__meta-text {
    font-family: 'Schibsted Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(0,0,0,.55);
  }
  .artist-header__meta-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(0,0,0,.35);
  }
</style>
</head>
<body>
<div class="artist-header" role="banner">
  <span class="artist-header__signature" aria-label="Jona Ferreira">Jona Ferreira</span>
  <div class="artist-header__meta" aria-label="Latest Release · Latin">
    <span class="artist-header__meta-text">Latest Release</span>
    <span class="artist-header__meta-dot" aria-hidden="true"></span>
    <span class="artist-header__meta-text">Latin</span>
  </div>
</div>
</body>
</html>
