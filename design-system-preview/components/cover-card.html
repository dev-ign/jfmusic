<!-- @dsCard group="Components" name="Cover Card" subtitle="Album art · pill buttons · 3D flip" viewport='{"width":640,"height":420}' -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cover Card — Caramelo Components</title>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(to bottom, #f9ecd3, #e4a45e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .cover-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .cover-card__image-wrap {
    width: 280px;
    height: 280px;
    border-radius: 16.667px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    background: linear-gradient(135deg, #e4a45e 0%, #843a09 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover-card__placeholder {
    font-family: 'Schibsted Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,.6);
    letter-spacing: .06em;
  }
  .cover-card__pills {
    display: flex;
    gap: 8px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 100px;
    background: rgba(0,0,0,.28);
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    border: none;
    cursor: pointer;
    font-family: 'Schibsted Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    transition: opacity .15s ease;
  }
  .pill:hover { opacity: .85; }
  .pill--active { background: rgba(0,0,0,.5); }
</style>
</head>
<body>
<div class="cover-card">
  <div class="cover-card__image-wrap">
    <span class="cover-card__placeholder">cover art</span>
  </div>
  <div class="cover-card__pills">
    <button class="pill pill--active">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="3" y="3" width="14" height="14" rx="2" stroke="white" stroke-width="1.5"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      Cover
    </button>
    <button class="pill">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M4 6h12M4 10h12M4 14h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      Credits
    </button>
  </div>
</div>
</body>
</html>
